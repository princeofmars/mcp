services:
  admin:
    build: .
    command: uvicorn app.api:app --host 0.0.0.0 --port 8000
    env_file: .env
    ports:
      - "8000:8000"
    volumes:
      - ./data:/data
    restart: unless-stopped

  mcp:
    build: .
    command: python -m app.mcp_server
    env_file: .env
    ports:
      - "8001:8001"
    volumes:
      - ./data:/data
    depends_on:
      - admin
    restart: unless-stopped
